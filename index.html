<div id="content1"></div>
<div id="content2"></div>
<div id="content3"></div>

<script>
  function loadFile(id, url) {
    fetch(url)
      .then(response => response.text())
      .then(data => document.getElementById(id).innerHTML = data);
  }
  
  loadFile('content1', 'index1.html');
  loadFile('content2', 'index2.html');
  loadFile('content3', 'index3.html');
</script>
